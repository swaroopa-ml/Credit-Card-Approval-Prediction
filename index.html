<!DOCTYPE html>
<html>
<head>

    <title>Credit Card Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<div class="form-card">

<h2>Applicant Details</h2>

<form action="/predict" method="POST">

<input type="number" name="ID" placeholder="Applicant ID" required>

<label>Gender</label>
<select name="CODE_GENDER" required>
    <option value="">Select</option>
    <option value="0">0</option>
    <option value="1">1</option>
</select>

<label>Own Car</label>
<select name="FLAG_OWN_CAR" required>
    <option value="">Select</option>
    <option value="0">No (0)</option>
    <option value="1">Yes (1)</option>
</select>

<label>Own House</label>
<select name="FLAG_OWN_REALTY" required>
    <option value="">Select</option>
    <option value="0">No (0)</option>
    <option value="1">Yes (1)</option>
</select>

<input type="number" name="CNT_CHILDREN" placeholder="Children Count" required>

<input type="number" step="0.01" name="AMT_INCOME_TOTAL" placeholder="Annual Income" required>

<label>Income Type</label>
<select name="NAME_INCOME_TYPE" required>
<option value="">Select</option>
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
</select>

<label>Education Type</label>
<select name="NAME_EDUCATION_TYPE" required>
<option value="">Select</option>
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
</select>

<label>Family Status</label>
<select name="NAME_FAMILY_STATUS" required>
<option value="">Select</option>
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
</select>

<label>Housing Type</label>
<select name="NAME_HOUSING_TYPE" required>
<option value="">Select</option>
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
</select>

<input type="number" name="DAYS_BIRTH" placeholder="Days Birth" required>

<input type="number" name="DAYS_EMPLOYED" placeholder="Days Employed" required>

<input type="number" name="FLAG_MOBIL" placeholder="Mobile Available (1)" required>

<input type="number" name="FLAG_WORK_PHONE" placeholder="Work Phone (1/0)" required>

<input type="number" name="FLAG_PHONE" placeholder="Phone (1/0)" required>

<input type="number" name="FLAG_EMAIL" placeholder="Email (1/0)" required>

<label>Occupation Type</label>
<select name="OCCUPATION_TYPE" required>
<option value="">Select</option>
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
<option value="13">13</option>
<option value="14">14</option>
<option value="15">15</option>
<option value="16">16</option>
<option value="17">17</option>
<option value="18">18</option>
</select>

<input type="number" step="0.1" name="CNT_FAM_MEMBERS" placeholder="Family Members" required>

<button type="submit">Predict</button>

</form>

</div>

</div>

</body>
</html>
